<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="profile-card p-4 p-md-5">
        <h2 class="text-main mb-4">My Profile</h2>

        <div class="mb-4 profile-meta">
          <p class="mb-2"><strong>User ID:</strong> {{ userId || 'N/A' }}</p>
          <p class="mb-2"><strong>Account:</strong> {{ email }}</p>
          <p class="mb-0 text-capitalize"><strong>Role:</strong> {{ role }}</p>
        </div>

        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input id="fullName" class="form-control" type="text" formControlName="fullName" />
            <small class="text-danger" *ngIf="profileForm.get('fullName')?.touched && profileForm.get('fullName')?.invalid">
              Full name must be at least 3 characters.
            </small>
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input id="phone" class="form-control" type="tel" formControlName="phone" />
            <small class="text-danger" *ngIf="profileForm.get('phone')?.touched && profileForm.get('phone')?.invalid">
              Enter a valid Egyptian mobile number.
            </small>
          </div>

          <div class="mb-3">
            <label for="city" class="form-label">City</label>
            <input id="city" class="form-control" type="text" formControlName="city" />
          </div>

          <div class="mb-4">
            <label for="address" class="form-label">Address</label>
            <textarea id="address" rows="3" class="form-control" formControlName="address"></textarea>
          </div>

          <button type="submit" class="main-btn px-4 py-2">Save Profile</button>
        </form>
      </div>
    </div>
  </div>
</section>
